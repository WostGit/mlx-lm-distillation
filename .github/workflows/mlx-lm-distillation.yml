                      parts.append(f'<text x="{(x1+x2)/2}" y="{(y1+y2)/2-10}" text-anchor="middle" font-family="Arial, sans-serif" font-size="12">{esc(label)}</text>')
              box(80,100,170,70,"Secret capability","#f3f4f6")
