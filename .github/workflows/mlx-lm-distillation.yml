          - Workflow: ${GITHUB_WORKFLOW}
          - Run id: ${GITHUB_RUN_ID}
          - Run attempt: ${GITHUB_RUN_ATTEMPT}
          - Commit: ${GITHUB_SHA}
          - Generated at: $(date -u +%Y-%m-%dT%H:%M:%SZ)

          This workflow generated a self-contained Lean project, built it, audited it, ran MLX proof-matched experiments, generated graphs/tables/HTML, and packaged a reviewer artifact.

          Main result:
          - Deterministic post-processing gap: 0.
          - Candidate-best gap: 0.
          - Finite code-cost gap: 0.
          - Route-metadata false pass: true.
          - Route-metadata lift: +7500 successes.
          EOF

          find ci-results/latest -type f | sort

      - name: Commit generated project and results back to repo
        if: always() && github.event_name != 'pull_request'
        run: |
          set -euxo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            lean-toolchain \
            lakefile.lean \
            PACXAI.lean \
            PACXAI \
            scripts \
            experiments \
            results \
            ci-results/latest \
            README.md \
            THREAT_MODEL.md \
            ARTIFACT_EVALUATION_README.md \
            BEGINNER_GUIDE.md \
            S_AND_P_POSITIONING.md \
            ASSUMPTION_BUG_DEMONSTRATION.md

          if git diff --cached --quiet; then
            echo "No generated project/result changes to commit."
          else
            git commit -m "ci: generate 10-10 Lean+MLX PACXAI artifact [skip ci]"
            git push
          fi

      - name: Upload 10-10 reviewer artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pacxai-10-10-lean-mlx-reviewer-packet
          path: |
            pacxai_10_10_reviewer_packet.zip
            reviewer_packet/**
            lean-toolchain
            lakefile.lean
            PACXAI.lean
            PACXAI/**
            scripts/**
            experiments/**
            README.md
            THREAT_MODEL.md
            ARTIFACT_EVALUATION_README.md
            BEGINNER_GUIDE.md
            S_AND_P_POSITIONING.md
            ASSUMPTION_BUG_DEMONSTRATION.md
            lean-version.log
            lake-version.log
            project-files.log
            lean-build.log
            lean-audit.log
            mlx-proof-matched.log
            results/**
            ci-results/latest/**
          if-no-files-found: ignore
          retention-days: 30
