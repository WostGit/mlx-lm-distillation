      - name: Install elan and Lean
        run: |
          set -euxo pipefail
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Install selected Lean toolchain
        run: |
          set -euxo pipefail
          TOOLCHAIN="$(cat lean-toolchain)"
          if elan toolchain list | grep -Fxq "$TOOLCHAIN"; then
            echo "Toolchain already installed: $TOOLCHAIN"
          else
            elan toolchain install "$TOOLCHAIN"
          fi
          elan default "$TOOLCHAIN"
          lean --version | tee lean-version.log
          lake --version | tee lake-version.log

      - name: Show generated project files without noise
        run: |
          set -euxo pipefail
          find lean-toolchain lakefile.lean PACXAI.lean PACXAI scripts experiments README.md THREAT_MODEL.md ARTIFACT_EVALUATION_README.md BEGINNER_GUIDE.md S_AND_P_POSITIONING.md ASSUMPTION_BUG_DEMONSTRATION.md -type f \
            | sort | tee project-files.log

      - name: Build Lean project
        run: |
          set -euxo pipefail
          lake build 2>&1 | tee lean-build.log

      - name: Run Lean forbidden-token and axiom audit
        run: |
          set -euxo pipefail
          bash scripts/audit.sh 2>&1 | tee lean-audit.log

      - name: Run proof-matched MLX experiments
        run: |
          set -euxo pipefail
          source .venv/bin/activate
          python experiments/mlx_proof_matched_experiments.py 2>&1 | tee mlx-proof-matched.log

      - name: Validate MLX and Lean-aligned signals
        run: |
          set -euxo pipefail
          source .venv/bin/activate
          python - <<'PY'
          import json
          from pathlib import Path

          s = json.loads(Path("results/mlx_proof_matched/summary.json").read_text())

          print("================================================================================")
          print("VALIDATION: PACXAI LEAN + MLX SIGNALS")
          print("================================================================================")
          print(json.dumps(s, indent=2))

          assert s["deterministic_student_minus_transcript_simulator_success"] == 0
          assert s["candidate_best_gap"] == 0
          assert s["code_cost_gap"] == 0
          assert s["fano_student_valid"] is True
          assert s["fano_transcript_valid"] is True
          assert s["monte_carlo_transcript_pass"] is True
          assert s["monte_carlo_student_pass"] is True
          assert s["route_metadata_false_pass_under_transcript_audit"] is True
          assert s["route_metadata_student_minus_transcript_simulator_success"] > 0
          for group, rec in s["conditional"].items():
              assert rec["deterministic_gap"] == 0, (group, rec)

          print("Verdict: all Lean-aligned MLX checks PASS")
          print("================================================================================")
          PY

      - name: Generate publishable graphs, tables, HTML, and console report
        run: |
          set -euxo pipefail
          source .venv/bin/activate
          python experiments/print_publishable_report.py

      - name: Package reviewer artifact
        run: |
          set -euxo pipefail

          rm -rf reviewer_packet
          mkdir -p reviewer_packet

          cp -R PACXAI reviewer_packet/
          cp -R scripts reviewer_packet/
          cp -R experiments reviewer_packet/
          cp -R results reviewer_packet/
          cp lean-toolchain lakefile.lean PACXAI.lean README.md THREAT_MODEL.md ARTIFACT_EVALUATION_README.md BEGINNER_GUIDE.md S_AND_P_POSITIONING.md ASSUMPTION_BUG_DEMONSTRATION.md reviewer_packet/
          cp lean-version.log lake-version.log lean-build.log lean-audit.log mlx-proof-matched.log project-files.log reviewer_packet/

          cat > reviewer_packet/OPEN_ME_FIRST.md <<'EOF'
          # PACXAI Reviewer Packet

          Start here:

          1. Open `results/publishable_artifacts/index.html`.
          2. Read `results/publishable_artifacts/REPORT.md`.
          3. Inspect `lean-audit.log`.
          4. Inspect `results/mlx_proof_matched/summary.json`.

          Main result:

          - Valid deterministic post-processing gap: 0.
          - Candidate-best gap: 0.
          - Finite code-cost gap: 0.
          - Route-metadata false pass: true.
          - Route-metadata lift: +7500 successes.

          This is a finite recovery/privacy audit artifact, not a full Shannon/Gaussian/rate-distortion formalization.
          EOF

          zip -r pacxai_10_10_reviewer_packet.zip reviewer_packet

          echo "Reviewer packet created:"
          ls -lh pacxai_10_10_reviewer_packet.zip

      - name: Prepare committed CI results
        if: always()
        run: |
          set -euxo pipefail

          rm -rf ci-results/latest
          mkdir -p ci-results/latest

          cp lean-version.log ci-results/latest/ 2>/dev/null || true
          cp lake-version.log ci-results/latest/ 2>/dev/null || true
          cp project-files.log ci-results/latest/ 2>/dev/null || true
          cp lean-build.log ci-results/latest/ 2>/dev/null || true
          cp lean-audit.log ci-results/latest/ 2>/dev/null || true
          cp mlx-proof-matched.log ci-results/latest/ 2>/dev/null || true
          cp pacxai_10_10_reviewer_packet.zip ci-results/latest/ 2>/dev/null || true

          if [ -d results ]; then
            mkdir -p ci-results/latest/results
            cp -R results/. ci-results/latest/results/
          fi

          cat > ci-results/latest/summary.md <<EOF
