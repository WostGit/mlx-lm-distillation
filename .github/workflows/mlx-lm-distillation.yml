name: PACXAI Real MLX-LM Distillation Case Study

on:
  workflow_dispatch:
    inputs:
      model:
        description: "MLX-LM model used as both teacher base and tiny QLoRA student base"
        required: true
        default: "mlx-community/Qwen2.5-0.5B-Instruct-4bit"
      train_examples:
        description: "Number of generated training examples"
        required: true
        default: "48"
      eval_examples:
        description: "Number of held-out evaluation examples"
        required: true
        default: "18"
      iters:
        description: "QLoRA iterations per student adapter"
        required: true
        default: "40"
      num_layers:
        description: "Number of layers to adapt"
        required: true
        default: "4"
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: write
  actions: read

jobs:
  mlx-lm-distillation:
    runs-on: macos-15
    timeout-minutes: 180

    env:
      MODEL_ID: ${{ github.event.inputs.model || 'mlx-community/Qwen2.5-0.5B-Instruct-4bit' }}
      TRAIN_EXAMPLES: ${{ github.event.inputs.train_examples || '48' }}
      EVAL_EXAMPLES: ${{ github.event.inputs.eval_examples || '18' }}
      QLORA_ITERS: ${{ github.event.inputs.iters || '40' }}
      NUM_LAYERS: ${{ github.event.inputs.num_layers || '4' }}
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
      TOKENIZERS_PARALLELISM: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show runner information
        run: |
          set -euxo pipefail
          uname -a
          uname -m
          sw_vers || true
          sysctl -n machdep.cpu.brand_string || true

      - name: Install Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create virtualenv and install MLX-LM training stack
        run: |
          set -euxo pipefail

          python3 -m venv .venv
          source .venv/bin/activate

          python -m pip install --upgrade pip
          python -m pip install "mlx-lm[train]" numpy

          python - <<'PY'
          import platform
          import mlx.core as mx
          import mlx_lm

          print("platform:", platform.platform())
          print("machine:", platform.machine())
          print("mlx_lm:", getattr(mlx_lm, "__version__", "unknown"))

          x = mx.array([1.0, 2.0, 3.0])
          y = mx.sum(x)
          mx.eval(y)
          print("mlx smoke sum:", float(y))
          print("mlx default device:", mx.default_device())
          PY

          mlx_lm.generate --help >/tmp/mlx_lm_generate_help.txt
          mlx_lm.lora --help >/tmp/mlx_lm_lora_help.txt

      - name: Install Lean if project exists
        if: ${{ hashFiles('lakefile.lean') != '' }}
        run: |
          set -euxo pipefail

          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf \
            | sh -s -- -y --default-toolchain none

          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Build Lean project if present
        if: ${{ hashFiles('lakefile.lean') != '' }}
        run: |
          set -euxo pipefail

          TOOLCHAIN="$(cat lean-toolchain)"
          elan toolchain install "$TOOLCHAIN" || true
          elan default "$TOOLCHAIN"

          lean --version | tee lean-version.log
          lake --version | tee lake-version.log

          lake build 2>&1 | tee lean-build.log

      - name: Run Lean audit if present
        if: ${{ hashFiles('scripts/audit.sh') != '' }}
        run: |
          set -euxo pipefail
          bash scripts/audit.sh 2>&1 | tee lean-audit.log

      - name: Write MLX-LM teacher generation and dataset builder
        run: |
          set -euxo pipefail

          mkdir -p experiments
          mkdir -p data/mlx_lm_distill
          mkdir -p results/mlx_lm_distillation

          cat > experiments/mlx_lm_make_distillation_data.py <<'PY'
          #!/usr/bin/env python3
          """
          Real MLX-LM teacher generation for PACXAI route-metadata audit.

          This script:
            1. loads an actual MLX-LM model;
            2. queries it as a teacher to create transcript responses;
            3. writes two QLoRA datasets:
                 - transcript_only: prompt + teacher response only
                 - transcript_route: prompt + teacher response + omitted route_id
            4. writes a held-out eval set.

          The route_id is intentionally omitted from transcript_only.  The paper
          question is whether a student trained with route metadata recovers
          hidden capability labels better than one trained from the audited
          transcript alone.
          """
          from __future__ import annotations

          import json
          import os
          import random
          from pathlib import Path
          from typing import Dict, List

          import mlx.core as mx
          from mlx_lm import load, generate

          MODEL_ID = os.environ.get("MODEL_ID", "mlx-community/Qwen2.5-0.5B-Instruct-4bit")
          TRAIN_EXAMPLES = int(os.environ.get("TRAIN_EXAMPLES", "48"))
          EVAL_EXAMPLES = int(os.environ.get("EVAL_EXAMPLES", "18"))
          SEED = 20260610

          CAPABILITIES = [
              "reasoning",
              "coding",
              "tool_use",
              "computer_use",
              "policy_edge",
              "domain_expert",
          ]

          ROUTE_FOR_CAP = {
              "reasoning": "reasoning_route",
              "coding": "code_route",
              "tool_use": "tool_route",
              "computer_use": "computer_route",
              "policy_edge": "safety_route",
              "domain_expert": "expert_route",
          }

          GROUPS = ["normal", "proxy_cluster", "suspicious_campaign", "enterprise_eval"]

          TASK_TEMPLATES = {
              "reasoning": [
                  "Solve a short logic puzzle involving two boxes and one hidden key.",
                  "Answer a multi-step arithmetic word problem about trains and timing.",
                  "Explain which of three claims follows from a pair of premises.",
              ],
              "coding": [
                  "Write a Python function that reverses words in a sentence.",
                  "Debug a short loop that computes prefix sums.",
                  "Explain why a binary search implementation may fail at boundaries.",
              ],
              "tool_use": [
                  "Plan how an agent should call a weather API and then summarize the result.",
                  "Describe the sequence of tool calls needed to book a calendar meeting.",
                  "Given a database lookup tool, decide which query should be issued first.",
              ],
              "computer_use": [
                  "Describe how to navigate a settings menu to change a privacy option.",
                  "Explain steps for using a browser to compare two product pages.",
                  "Plan a GUI workflow for downloading a file and moving it to a folder.",
              ],
              "policy_edge": [
                  "Classify whether a borderline request should be refused or answered safely.",
                  "Rewrite a risky request into a safe educational alternative.",
                  "Explain a safe response strategy for a dual-use prompt.",
              ],
              "domain_expert": [
                  "Summarize a clinical trial abstract at a high level without medical advice.",
                  "Explain a finance risk concept using a simple example.",
                  "Interpret a legal clause in plain language without giving legal advice.",
              ],
          }

          LABEL_LIST = ", ".join(CAPABILITIES)

          def chat_prompt(tokenizer, system: str, user: str) -> str:
              messages = [
                  {"role": "system", "content": system},
                  {"role": "user", "content": user},
              ]
              try:
                  return tokenizer.apply_chat_template(
                      messages,
                      tokenize=False,
                      add_generation_prompt=True,
                  )
              except TypeError:
                  return tokenizer.apply_chat_template(
                      messages,
                      add_generation_prompt=True,
                  )

          def make_population(n: int) -> List[Dict[str, str]]:
              rows: List[Dict[str, str]] = []
              idx = 0
              while len(rows) < n:
                  for cap in CAPABILITIES:
                      template = TASK_TEMPLATES[cap][idx % len(TASK_TEMPLATES[cap])]
                      group = GROUPS[(idx * 7 + len(cap)) % len(GROUPS)]
                      rows.append(
                          {
                              "id": f"ex_{len(rows):04d}",
                              "capability": cap,
                              "route_id": ROUTE_FOR_CAP[cap],
                              "group": group,
                              "task_prompt": template,
                          }
                      )
                      if len(rows) >= n:
                          break
                  idx += 1
              return rows

          def teacher_generate(model, tokenizer, task_prompt: str) -> str:
              system = (
                  "You are a concise teacher model. Answer the user's task in 2-4 short sentences. "
                  "Do not mention hidden capability labels, route IDs, or metadata."
              )
              prompt = chat_prompt(tokenizer, system, task_prompt)
              text = generate(
                  model,
                  tokenizer,
                  prompt=prompt,
                  max_tokens=80,
                  verbose=False,
              )
              return str(text).strip().replace("\n", " ")

          def audit_prompt(row: Dict[str, str], include_route: bool) -> str:
              base = (
                  "You are auditing a transcript from a model API. "
                  "Recover the hidden capability label that best explains the transcript. "
                  f"Allowed labels: {LABEL_LIST}. "
                  "Answer with exactly one allowed label and nothing else.\n\n"
                  f"USER_TASK:\n{row['task_prompt']}\n\n"
                  f"TEACHER_RESPONSE:\n{row['teacher_response']}\n"
              )

              if include_route:
                  base += (
                      "\nUNLOGGED_INTERNAL_METADATA_INCLUDED_FOR_THIS_STUDENT:\n"
                      f"route_id={row['route_id']}\n"
                  )

              return base

          def chat_example(row: Dict[str, str], include_route: bool) -> Dict[str, object]:
              return {
                  "messages": [
                      {
                          "role": "system",
                          "content": "You are a strict classifier. Output one label exactly.",
                      },
                      {
                          "role": "user",
                          "content": audit_prompt(row, include_route),
                      },
                      {
                          "role": "assistant",
                          "content": row["capability"],
                      },
                  ]
              }

          def write_jsonl(path: Path, records: List[Dict[str, object]]) -> None:
              path.parent.mkdir(parents=True, exist_ok=True)
              with path.open("w", encoding="utf-8") as f:
                  for rec in records:
                      f.write(json.dumps(rec, ensure_ascii=False) + "\n")

          def main() -> None:
              random.seed(SEED)
              mx.random.seed(SEED)

              total = TRAIN_EXAMPLES + EVAL_EXAMPLES
              rows = make_population(total)

              print(f"Loading MLX-LM teacher/base model: {MODEL_ID}")
              model, tokenizer = load(MODEL_ID)

              for i, row in enumerate(rows):
                  print(f"teacher_generation {i + 1}/{len(rows)} {row['capability']} {row['route_id']}")
                  row["teacher_response"] = teacher_generate(model, tokenizer, row["task_prompt"])

              train_rows = rows[:TRAIN_EXAMPLES]
              eval_rows = rows[TRAIN_EXAMPLES:]

              transcript_train = [chat_example(r, include_route=False) for r in train_rows]
              route_train = [chat_example(r, include_route=True) for r in train_rows]

              transcript_eval = [chat_example(r, include_route=False) for r in eval_rows]
              route_eval = [chat_example(r, include_route=True) for r in eval_rows]

              write_jsonl(Path("data/mlx_lm_distill/transcript_only/train.jsonl"), transcript_train)
              write_jsonl(Path("data/mlx_lm_distill/transcript_only/valid.jsonl"), transcript_eval[: max(1, len(transcript_eval)//2)])
              write_jsonl(Path("data/mlx_lm_distill/transcript_only/test.jsonl"), transcript_eval)

              write_jsonl(Path("data/mlx_lm_distill/transcript_route/train.jsonl"), route_train)
              write_jsonl(Path("data/mlx_lm_distill/transcript_route/valid.jsonl"), route_eval[: max(1, len(route_eval)//2)])
              write_jsonl(Path("data/mlx_lm_distill/transcript_route/test.jsonl"), route_eval)

              write_jsonl(Path("data/mlx_lm_distill/eval_transcript_prompts.jsonl"), [
                  {
                      "id": r["id"],
                      "capability": r["capability"],
                      "route_id": r["route_id"],
                      "group": r["group"],
                      "prompt": audit_prompt(r, include_route=False),
                  }
                  for r in eval_rows
              ])

              write_jsonl(Path("data/mlx_lm_distill/eval_route_prompts.jsonl"), [
                  {
                      "id": r["id"],
                      "capability": r["capability"],
                      "route_id": r["route_id"],
                      "group": r["group"],
                      "prompt": audit_prompt(r, include_route=True),
                  }
                  for r in eval_rows
              ])

              write_jsonl(Path("data/mlx_lm_distill/generated_teacher_rows.jsonl"), rows)

              summary = {
                  "model_id": MODEL_ID,
                  "train_examples": len(train_rows),
                  "eval_examples": len(eval_rows),
                  "capabilities": CAPABILITIES,
              }
              Path("results/mlx_lm_distillation").mkdir(parents=True, exist_ok=True)
              Path("results/mlx_lm_distillation/data_summary.json").write_text(
                  json.dumps(summary, indent=2),
                  encoding="utf-8",
              )
              print(json.dumps(summary, indent=2))

          if __name__ == "__main__":
              main()
          PY
          chmod +x experiments/mlx_lm_make_distillation_data.py

      - name: Generate real teacher transcripts with MLX-LM
        run: |
          set -euxo pipefail
          source .venv/bin/activate
          python experiments/mlx_lm_make_distillation_data.py 2>&1 | tee teacher-generation.log

      - name: Tiny QLoRA student on transcript-only corpus
        run: |
          set -euxo pipefail
          source .venv/bin/activate

          mkdir -p adapters/transcript_only

          mlx_lm.lora \
            --model "$MODEL_ID" \
            --train \
            --data data/mlx_lm_distill/transcript_only \
            --iters "$QLORA_ITERS" \
            --batch-size 1 \
            --num-layers "$NUM_LAYERS" \
            --adapter-path adapters/transcript_only \
            --mask-prompt 2>&1 | tee qlora-transcript-only.log

      - name: Tiny QLoRA student on transcript plus route metadata corpus
        run: |
          set -euxo pipefail
          source .venv/bin/activate

          mkdir -p adapters/transcript_route

          mlx_lm.lora \
            --model "$MODEL_ID" \
            --train \
            --data data/mlx_lm_distill/transcript_route \
            --iters "$QLORA_ITERS" \
            --batch-size 1 \
            --num-layers "$NUM_LAYERS" \
            --adapter-path adapters/transcript_route \
            --mask-prompt 2>&1 | tee qlora-transcript-route.log

      - name: Write MLX-LM adapter evaluation script
        run: |
          set -euxo pipefail

          cat > experiments/mlx_lm_eval_recovery.py <<'PY'
          #!/usr/bin/env python3
          from __future__ import annotations

          import csv
          import json
          import os
          from pathlib import Path
          from typing import Dict, List

          import mlx.core as mx
          from mlx_lm import load, generate

          MODEL_ID = os.environ.get("MODEL_ID", "mlx-community/Qwen2.5-0.5B-Instruct-4bit")
          CAPABILITIES = [
              "reasoning",
              "coding",
              "tool_use",
              "computer_use",
              "policy_edge",
              "domain_expert",
          ]

          def read_jsonl(path: Path) -> List[Dict[str, str]]:
              rows = []
              with path.open("r", encoding="utf-8") as f:
                  for line in f:
                      if line.strip():
                          rows.append(json.loads(line))
              return rows

          def chat_prompt(tokenizer, user: str) -> str:
              messages = [
                  {"role": "system", "content": "You are a strict classifier. Output one allowed label exactly."},
                  {"role": "user", "content": user},
              ]
              try:
                  return tokenizer.apply_chat_template(
                      messages,
                      tokenize=False,
                      add_generation_prompt=True,
                  )
              except TypeError:
                  return tokenizer.apply_chat_template(
                      messages,
                      add_generation_prompt=True,
                  )

          def parse_label(text: str) -> str:
              lower = text.lower().strip()
              lower = lower.replace("-", "_").replace(" ", "_")
              for cap in CAPABILITIES:
                  if cap in lower:
                      return cap
              return "unparsed"

          def evaluate(adapter_path: str, prompt_file: Path, name: str) -> Dict[str, object]:
              print(f"Loading model {MODEL_ID} with adapter {adapter_path}")
              model, tokenizer = load(MODEL_ID, adapter_path=adapter_path)

              rows = read_jsonl(prompt_file)
              pred_rows = []
              correct = 0

              for i, row in enumerate(rows):
                  prompt = chat_prompt(tokenizer, row["prompt"])
                  out = generate(
                      model,
                      tokenizer,
                      prompt=prompt,
                      max_tokens=12,
                      verbose=False,
                  )
                  pred = parse_label(str(out))
                  ok = pred == row["capability"]
                  correct += int(ok)

                  pred_rows.append({
                      "student": name,
                      "id": row["id"],
                      "group": row["group"],
                      "route_id": row["route_id"],
                      "gold": row["capability"],
                      "prediction": pred,
                      "correct": ok,
                      "raw_output": str(out).replace("\n", " "),
                  })

                  print(f"{name} eval {i+1}/{len(rows)} gold={row['capability']} pred={pred} ok={ok}")

              total = len(rows)
              return {
                  "name": name,
                  "success": correct,
                  "failure": total - correct,
                  "total": total,
                  "rate": correct / total if total else 0.0,
                  "pred_rows": pred_rows,
              }

          def main() -> None:
              out_dir = Path("results/mlx_lm_distillation")
              out_dir.mkdir(parents=True, exist_ok=True)

              transcript_eval = Path("data/mlx_lm_distill/eval_transcript_prompts.jsonl")
              route_eval = Path("data/mlx_lm_distill/eval_route_prompts.jsonl")

              transcript_res = evaluate(
                  "adapters/transcript_only",
                  transcript_eval,
                  "qlora_transcript_only_student",
              )

              mx.clear_cache()

              route_res = evaluate(
                  "adapters/transcript_route",
                  route_eval,
                  "qlora_route_metadata_student",
              )

              # Transcript simulator for the route student cannot use route prompts.
              # The clean comparison is transcript-only student vs route-metadata student.
              gap = route_res["success"] - transcript_res["success"]

              budget = transcript_res["success"] + max(1, int(0.02 * transcript_res["total"]))
              false_pass = transcript_res["success"] <= budget and route_res["success"] > budget

              summary = {
                  "model_id": MODEL_ID,
                  "transcript_only_success": transcript_res["success"],
                  "route_metadata_success": route_res["success"],
                  "total": transcript_res["total"],
                  "transcript_only_rate": transcript_res["rate"],
                  "route_metadata_rate": route_res["rate"],
                  "route_metadata_minus_transcript_success": gap,
                  "audit_budget_allowed_successes": budget,
                  "route_metadata_false_pass_under_transcript_audit": false_pass,
                  "interpretation": (
                      "Both students are real MLX-LM QLoRA adapters. The route-metadata adapter was trained "
                      "with route_id in the prompt; the transcript-only adapter was not. A positive gap shows "
                      "the missing post-processing boundary."
                  ),
              }

              all_preds = transcript_res["pred_rows"] + route_res["pred_rows"]
              with (out_dir / "predictions.csv").open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(
                      f,
                      fieldnames=[
                          "student",
                          "id",
                          "group",
                          "route_id",
                          "gold",
                          "prediction",
                          "correct",
                          "raw_output",
                      ],
                  )
                  writer.writeheader()
                  writer.writerows(all_preds)

              (out_dir / "summary.json").write_text(
                  json.dumps(summary, indent=2),
                  encoding="utf-8",
              )

              report = f"""# Real MLX-LM QLoRA Distillation Case Study

          ## Setup

          - Model: `{MODEL_ID}`
          - Transcript-only student: QLoRA adapter trained on audited transcripts.
          - Route-metadata student: QLoRA adapter trained on transcripts plus omitted `route_id`.

          ## Results

          - Transcript-only success: {summary['transcript_only_success']} / {summary['total']} ({summary['transcript_only_rate']:.3f})
          - Route-metadata success: {summary['route_metadata_success']} / {summary['total']} ({summary['route_metadata_rate']:.3f})
          - Route-metadata minus transcript success: {summary['route_metadata_minus_transcript_success']}
          - Audit budget allowed successes: {summary['audit_budget_allowed_successes']}
          - Route metadata false pass under transcript audit: {summary['route_metadata_false_pass_under_transcript_audit']}

          ## Interpretation

          This is the real MLX-LM version of the Lean post-processing story.
          The transcript-only student corresponds to the valid theorem shape:

          ```text
          train : Transcript -> Student
          ```

          The route-metadata student corresponds to the invalid audit shape:

          ```text
          train : Transcript -> RouteMetadata -> Student
          ```

          A positive route-metadata recovery gap shows that the artifact-level audit was checking the wrong boundary.
          """
              (out_dir / "REPORT.md").write_text(report, encoding="utf-8")

              print(json.dumps(summary, indent=2))

          if __name__ == "__main__":
              main()
          PY
          chmod +x experiments/mlx_lm_eval_recovery.py

      - name: Evaluate QLoRA students
        run: |
          set -euxo pipefail
          source .venv/bin/activate
          python experiments/mlx_lm_eval_recovery.py 2>&1 | tee eval-recovery.log

      - name: Validate MLX-LM distillation experiment
        run: |
          set -euxo pipefail
          source .venv/bin/activate

          python - <<'PY'
          import json
          from pathlib import Path

          summary = json.loads(Path("results/mlx_lm_distillation/summary.json").read_text())
          print(json.dumps(summary, indent=2))

          assert summary["total"] > 0
          assert summary["route_metadata_success"] >= summary["transcript_only_success"]
          PY

      - name: Prepare committed MLX-LM results
        if: always()
        run: |
          set -euxo pipefail

          rm -rf ci-results/mlx-lm
          mkdir -p ci-results/mlx-lm

          cp teacher-generation.log ci-results/mlx-lm/ 2>/dev/null || true
          cp qlora-transcript-only.log ci-results/mlx-lm/ 2>/dev/null || true
          cp qlora-transcript-route.log ci-results/mlx-lm/ 2>/dev/null || true
          cp eval-recovery.log ci-results/mlx-lm/ 2>/dev/null || true

          if [ -d data/mlx_lm_distill ]; then
            mkdir -p ci-results/mlx-lm/data
            cp -R data/mlx_lm_distill/. ci-results/mlx-lm/data/
          fi

          if [ -d results/mlx_lm_distillation ]; then
            mkdir -p ci-results/mlx-lm/results
            cp -R results/mlx_lm_distillation/. ci-results/mlx-lm/results/
          fi

          cat > ci-results/mlx-lm/summary.md <<EOF
          # Real MLX-LM QLoRA distillation results

          - Workflow: ${GITHUB_WORKFLOW}
          - Run id: ${GITHUB_RUN_ID}
          - Run attempt: ${GITHUB_RUN_ATTEMPT}
          - Commit: ${GITHUB_SHA}
          - Model: ${MODEL_ID}
          - Train examples: ${TRAIN_EXAMPLES}
          - Eval examples: ${EVAL_EXAMPLES}
          - QLoRA iterations: ${QLORA_ITERS}
          - Generated at: $(date -u +%Y-%m-%dT%H:%M:%SZ)

          This workflow used MLX-LM teacher generation and two tiny QLoRA student adapters.
          EOF

          find ci-results/mlx-lm -type f | sort

      - name: Commit generated experiment and MLX-LM results
        if: always() && github.event_name != 'pull_request'
        run: |
          set -euxo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            experiments/mlx_lm_make_distillation_data.py \
            experiments/mlx_lm_eval_recovery.py \
            data/mlx_lm_distill \
            results/mlx_lm_distillation \
            ci-results/mlx-lm

          if git diff --cached --quiet; then
            echo "No MLX-LM result changes to commit."
          else
            git commit -m "ci: add real MLX-LM QLoRA distillation case study [skip ci]"
            git push
          fi

      - name: Upload MLX-LM artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: real-mlx-lm-qlora-distillation
          path: |
            teacher-generation.log
            qlora-transcript-only.log
            qlora-transcript-route.log
            eval-recovery.log
            experiments/mlx_lm_make_distillation_data.py
            experiments/mlx_lm_eval_recovery.py
            data/mlx_lm_distill/**
            results/mlx_lm_distillation/**
            ci-results/mlx-lm/**
            adapters/transcript_only/**
            adapters/transcript_route/**
          if-no-files-found: ignore
          retention-days: 14
