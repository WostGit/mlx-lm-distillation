name: PACXAI 10-10 Lean + MLX Artifact

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: write
  actions: read

jobs:
  pacxai-10-10-artifact:
    name: Build, audit, evaluate, graph, and package PACXAI
    runs-on: macos-15
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Print artifact mission
        run: |
          set -euxo pipefail
          echo "================================================================================"
          echo "PACXAI 10/10 LEAN + MLX ARTIFACT"
          echo "================================================================================"
          echo "This workflow is fully self-contained."
          echo ""
          echo "It generates:"
          echo "  - Lean proof artifact"
          echo "  - Lean theorem audit"
          echo "  - MLX proof-matched experiments"
          echo "  - Human-readable console report"
          echo "  - CSV tables"
          echo "  - SVG graphs"
          echo "  - HTML reviewer report"
          echo "  - Packaged reviewer artifact"
          echo ""
          echo "Runner:"
          uname -a
          uname -m
          sw_vers || true
          sysctl -n machdep.cpu.brand_string || true
          echo "================================================================================"

      - name: Install Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MLX inside local venv
        run: |
          set -euxo pipefail
          python3 -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install mlx numpy

          python - <<'PY'
          import platform
          import mlx.core as mx

          print("================================================================================")
          print("MLX SMOKE TEST")
          print("================================================================================")
          print("Python platform:", platform.platform())
          print("Machine:", platform.machine())
          x = mx.array([1.0, 2.0, 3.0])
          y = mx.sum(x)
          mx.eval(y)
          print("MLX sum:", float(y))
          print("MLX default device:", mx.default_device())
          print("Verdict: MLX PASS")
          print("================================================================================")
          PY

      - name: Generate self-contained Lean project
        run: |
          set -euxo pipefail

          rm -rf PACXAI scripts experiments results ci-results reviewer_packet README.md ARTIFACT_EVALUATION_README.md THREAT_MODEL.md S_AND_P_POSITIONING.md ASSUMPTION_BUG_DEMONSTRATION.md BEGINNER_GUIDE.md
          mkdir -p PACXAI/InfoTheory
          mkdir -p PACXAI/PAC
          mkdir -p PACXAI/Leakage
          mkdir -p scripts
          mkdir -p experiments
          mkdir -p results

          cat > lean-toolchain <<'EOF'
          leanprover/lean4:v4.30.0-rc2
          EOF

          cat > lakefile.lean <<'EOF'
          import Lake
          open Lake DSL

          package «pacxai_10_10_artifact» where
            -- Self-contained, mathlib-free finite recovery/privacy artifact.

          @[default_target]
          lean_lib PACXAI where
            roots := #[`PACXAI]
          EOF

          cat > PACXAI.lean <<'EOF'
          import PACXAI.Core
          import PACXAI.Transcript
          import PACXAI.Recovery
          import PACXAI.Conditioning
          import PACXAI.Distillation
          import PACXAI.Leakage.FiniteCapacity
          import PACXAI.InfoTheory.FiniteDistribution
          import PACXAI.InfoTheory.DPI
          import PACXAI.InfoTheory.FanoStyle
          import PACXAI.PAC.MonteCarlo

          namespace PACXAI

          theorem ci_smoke : True := by
            trivial

          end PACXAI
          EOF

          cat > PACXAI/Core.lean <<'EOF'
          namespace PACXAI

          abbrev Observation (Secret Output : Type) := Secret -> Output

          abbrev Criterion (Secret Guess : Type) := Secret -> Guess -> Bool

          abbrev Population (Secret : Type) := List Secret

          def countWhere {A : Type} (xs : List A) (p : A -> Bool) : Nat :=
            (xs.filter p).length

          def successCount {Secret Guess : Type}
              (secrets : Population Secret)
              (criterion : Criterion Secret Guess)
              (attack : Secret -> Guess) : Nat :=
            countWhere secrets (fun s => criterion s (attack s))

          def failureCount {Secret Guess : Type}
              (secrets : Population Secret)
              (criterion : Criterion Secret Guess)
              (attack : Secret -> Guess) : Nat :=
            countWhere secrets (fun s => !(criterion s (attack s)))

          structure EmpiricalRate where
            numerator : Nat
            denominator : Nat
            deriving Repr, BEq

          def successRate {Secret Guess : Type}
              (secrets : Population Secret)
              (criterion : Criterion Secret Guess)
              (attack : Secret -> Guess) : EmpiricalRate :=
            { numerator := successCount secrets criterion attack, denominator := secrets.length }

          def passesBudget {Secret Guess : Type}
              (secrets : Population Secret)
              (criterion : Criterion Secret Guess)
              (budget : Nat)
              (attack : Secret -> Guess) : Prop :=
            successCount secrets criterion attack <= budget

          def postprocess {Secret Raw Out : Type}
              (obs : Observation Secret Raw)
              (f : Raw -> Out) : Observation Secret Out :=
            fun s => f (obs s)

          def liftedAttack {Raw Out Guess : Type}
              (f : Raw -> Out)
              (attack : Out -> Guess) : Raw -> Guess :=
            fun r => attack (f r)

          theorem postprocess_attack_pointwise {Secret Raw Out Guess : Type}
              (obs : Observation Secret Raw)
              (f : Raw -> Out)
              (attack : Out -> Guess)
              (s : Secret) :
              attack ((postprocess obs f) s) = (liftedAttack f attack) (obs s) := by
            rfl

          theorem postprocess_successCount_eq {Secret Raw Out Guess : Type}
              (secrets : Population Secret)
              (criterion : Criterion Secret Guess)
              (obs : Observation Secret Raw)
              (f : Raw -> Out)
              (attack : Out -> Guess) :
              successCount secrets criterion (fun s => attack ((postprocess obs f) s)) =
              successCount secrets criterion (fun s => (liftedAttack f attack) (obs s)) := by
            rfl

          theorem postprocess_successRate_eq {Secret Raw Out Guess : Type}
              (secrets : Population Secret)
              (criterion : Criterion Secret Guess)
              (obs : Observation Secret Raw)
              (f : Raw -> Out)
              (attack : Out -> Guess) :
              successRate secrets criterion (fun s => attack ((postprocess obs f) s)) =
              successRate secrets criterion (fun s => (liftedAttack f attack) (obs s)) := by
            rfl

          theorem postprocess_budget_sound {Secret Raw Out Guess : Type}
              (secrets : Population Secret)
              (criterion : Criterion Secret Guess)
              (budget : Nat)
              (obs : Observation Secret Raw)
              (f : Raw -> Out)
              (attack : Out -> Guess)
              (h : passesBudget secrets criterion budget (fun s => (liftedAttack f attack) (obs s))) :
              passesBudget secrets criterion budget (fun s => attack ((postprocess obs f) s)) := by
            exact h

          theorem distilled_student_attack_is_transcript_attack
              {Secret Transcript Student Guess : Type}
              (secrets : Population Secret)
              (criterion : Criterion Secret Guess)
              (transcript : Observation Secret Transcript)
              (train : Transcript -> Student)
              (studentAttack : Student -> Guess) :
              successCount secrets criterion (fun s => studentAttack (train (transcript s))) =
              successCount secrets criterion (fun s => (fun t => studentAttack (train t)) (transcript s)) := by
            rfl

          theorem distilled_student_rate_is_transcript_rate
              {Secret Transcript Student Guess : Type}
              (secrets : Population Secret)
              (criterion : Criterion Secret Guess)
              (transcript : Observation Secret Transcript)
              (train : Transcript -> Student)
              (studentAttack : Student -> Guess) :
              successRate secrets criterion (fun s => studentAttack (train (transcript s))) =
              successRate secrets criterion (fun s => (fun t => studentAttack (train t)) (transcript s)) := by
            rfl

          end PACXAI
          EOF

          cat > PACXAI/Transcript.lean <<'EOF'
          import PACXAI.Core

          namespace PACXAI

          structure Round (Query Answer Explanation : Type) where
            query : Query
            answer : Answer
            explanation : Explanation
            deriving Repr

          abbrev History (Query Answer Explanation : Type) := List (Round Query Answer Explanation)

          abbrev AdaptivePolicy (Side Query Answer Explanation : Type) :=
            Nat -> Side -> History Query Answer Explanation -> Query

          abbrev Answerer (Secret Query Answer Explanation : Type) :=
            Secret -> Query -> Answer × Explanation

          def runAdaptive {Secret Side Query Answer Explanation : Type}
              (policy : AdaptivePolicy Side Query Answer Explanation)
              (answerer : Answerer Secret Query Answer Explanation)
              (side : Side)
              (secret : Secret) : Nat -> History Query Answer Explanation
            | 0 => []
            | n + 1 =>
                let hist := runAdaptive policy answerer side secret n
                let q := policy n side hist
                let ae := answerer secret q
                hist ++ [{ query := q, answer := ae.fst, explanation := ae.snd }]

          theorem adaptive_next_query_is_policy {Side Query Answer Explanation : Type}
              (policy : AdaptivePolicy Side Query Answer Explanation)
              (side : Side)
              (hist : History Query Answer Explanation)
              (n : Nat) :
              policy n side hist = policy n side hist := by
            rfl

          theorem same_history_same_query {Side Query Answer Explanation : Type}
              (policy : AdaptivePolicy Side Query Answer Explanation)
              (side : Side)
              (hist : History Query Answer Explanation)
              (n : Nat) :
              policy n side hist = policy n side hist := by
            rfl

          end PACXAI
          EOF

          cat > PACXAI/Recovery.lean <<'EOF'
          import PACXAI.Core

          namespace PACXAI

          abbrev CandidateAttack (Observation Guess : Type) := Observation -> Guess

          def observedSuccessCount {Secret Obs Guess : Type}
              (secrets : Population Secret)
              (criterion : Criterion Secret Guess)
              (obs : Observation Secret Obs)
              (attack : CandidateAttack Obs Guess) : Nat :=
            successCount secrets criterion (fun s => attack (obs s))

          def observedSuccessRate {Secret Obs Guess : Type}
              (secrets : Population Secret)
              (criterion : Criterion Secret Guess)
              (obs : Observation Secret Obs)
              (attack : CandidateAttack Obs Guess) : EmpiricalRate :=
            successRate secrets criterion (fun s => attack (obs s))

          abbrev CandidateClass (Obs Guess : Type) := List (CandidateAttack Obs Guess)

          def candidateScores {Secret Obs Guess : Type}
              (secrets : Population Secret)
              (criterion : Criterion Secret Guess)
              (obs : Observation Secret Obs)
              (candidates : CandidateClass Obs Guess) : List Nat :=
            candidates.map (fun attack => observedSuccessCount secrets criterion obs attack)

          def bestNat : List Nat -> Nat
            | [] => 0
            | x :: xs => Nat.max x (bestNat xs)

          def candidateBestSuccess {Secret Obs Guess : Type}
              (secrets : Population Secret)
              (criterion : Criterion Secret Guess)
              (obs : Observation Secret Obs)
              (candidates : CandidateClass Obs Guess) : Nat :=
            bestNat (candidateScores secrets criterion obs candidates)

          def liftCandidateClass {Raw Out Guess : Type}
              (f : Raw -> Out)
              (candidates : CandidateClass Out Guess) : CandidateClass Raw Guess :=
            candidates.map (liftedAttack f)

          theorem candidateScores_postprocess_eq {Secret Raw Out Guess : Type}
              (secrets : Population Secret)
              (criterion : Criterion Secret Guess)
              (obs : Observation Secret Raw)
              (f : Raw -> Out)
              (candidates : CandidateClass Out Guess) :
              candidateScores secrets criterion (postprocess obs f) candidates =
              candidateScores secrets criterion obs (liftCandidateClass f candidates) := by
            induction candidates with
            | nil => rfl
            | cons a rest ih =>
                simp [candidateScores, liftCandidateClass, observedSuccessCount, postprocess, liftedAttack,
                  successCount, countWhere]

          theorem candidateBest_postprocess_eq_lifted {Secret Raw Out Guess : Type}
              (secrets : Population Secret)
              (criterion : Criterion Secret Guess)
              (obs : Observation Secret Raw)
              (f : Raw -> Out)
              (candidates : CandidateClass Out Guess) :
              candidateBestSuccess secrets criterion (postprocess obs f) candidates =
              candidateBestSuccess secrets criterion obs (liftCandidateClass f candidates) := by
            simp [candidateBestSuccess, candidateScores_postprocess_eq]

          def empiricalRisk {Secret Obs Guess : Type}
              (secrets : Population Secret)
              (criterion : Criterion Secret Guess)
              (obs : Observation Secret Obs)
              (attack : CandidateAttack Obs Guess) : Nat :=
            failureCount secrets criterion (fun s => attack (obs s))

          theorem empiricalRisk_postprocess_eq {Secret Raw Out Guess : Type}
              (secrets : Population Secret)
              (criterion : Criterion Secret Guess)
              (obs : Observation Secret Raw)
              (f : Raw -> Out)
              (attack : CandidateAttack Out Guess) :
              empiricalRisk secrets criterion (postprocess obs f) attack =
              empiricalRisk secrets criterion obs (liftedAttack f attack) := by
            rfl

          end PACXAI
          EOF

          cat > PACXAI/Conditioning.lean <<'EOF'
          import PACXAI.Core
          import PACXAI.Recovery

          namespace PACXAI

          def conditionPopulation {Secret : Type}
              (secrets : Population Secret)
              (condition : Secret -> Bool) : Population Secret :=
            secrets.filter condition

          def conditionalObservedSuccessCount {Secret Obs Guess : Type}
              (secrets : Population Secret)
              (condition : Secret -> Bool)
              (criterion : Criterion Secret Guess)
              (obs : Observation Secret Obs)
              (attack : CandidateAttack Obs Guess) : Nat :=
            observedSuccessCount (conditionPopulation secrets condition) criterion obs attack

          theorem conditional_postprocess_success_eq {Secret Raw Out Guess : Type}
              (secrets : Population Secret)
              (condition : Secret -> Bool)
              (criterion : Criterion Secret Guess)
              (obs : Observation Secret Raw)
              (f : Raw -> Out)
              (attack : CandidateAttack Out Guess) :
              conditionalObservedSuccessCount secrets condition criterion (postprocess obs f) attack =
              conditionalObservedSuccessCount secrets condition criterion obs (liftedAttack f attack) := by
            rfl

          theorem conditional_candidateBest_postprocess_eq_lifted {Secret Raw Out Guess : Type}
              (secrets : Population Secret)
              (condition : Secret -> Bool)
              (criterion : Criterion Secret Guess)
              (obs : Observation Secret Raw)
              (f : Raw -> Out)
              (candidates : CandidateClass Out Guess) :
              candidateBestSuccess (conditionPopulation secrets condition) criterion (postprocess obs f) candidates =
              candidateBestSuccess (conditionPopulation secrets condition) criterion obs (liftCandidateClass f candidates) := by
            exact candidateBest_postprocess_eq_lifted (conditionPopulation secrets condition) criterion obs f candidates

          end PACXAI
          EOF

          cat > PACXAI/Distillation.lean <<'EOF'
          import PACXAI.Core
          import PACXAI.Recovery
          import PACXAI.Conditioning
          import PACXAI.Transcript

          namespace PACXAI

          structure DistillationCampaign (Secret Transcript Student Guess : Type) where
            population : Population Secret
            criterion : Criterion Secret Guess
            transcript : Observation Secret Transcript
            train : Transcript -> Student
            studentAttack : Student -> Guess

          def studentObservation {Secret Transcript Student Guess : Type}
              (c : DistillationCampaign Secret Transcript Student Guess) : Observation Secret Student :=
            postprocess c.transcript c.train

          def transcriptSimulator {Secret Transcript Student Guess : Type}
              (c : DistillationCampaign Secret Transcript Student Guess) : Transcript -> Guess :=
            liftedAttack c.train c.studentAttack

          theorem student_attack_lifts_to_transcript {Secret Transcript Student Guess : Type}
              (c : DistillationCampaign Secret Transcript Student Guess) :
              observedSuccessCount c.population c.criterion (studentObservation c) c.studentAttack =
              observedSuccessCount c.population c.criterion c.transcript (transcriptSimulator c) := by
            rfl

          theorem student_rate_lifts_to_transcript {Secret Transcript Student Guess : Type}
              (c : DistillationCampaign Secret Transcript Student Guess) :
              observedSuccessRate c.population c.criterion (studentObservation c) c.studentAttack =
              observedSuccessRate c.population c.criterion c.transcript (transcriptSimulator c) := by
            rfl

          theorem conditional_student_attack_lifts_to_transcript {Secret Transcript Student Guess : Type}
              (c : DistillationCampaign Secret Transcript Student Guess)
              (condition : Secret -> Bool) :
              conditionalObservedSuccessCount c.population condition c.criterion (studentObservation c) c.studentAttack =
              conditionalObservedSuccessCount c.population condition c.criterion c.transcript (transcriptSimulator c) := by
            rfl

          theorem student_candidate_best_is_transcript_candidate_best_lifted
              {Secret Transcript Student Guess : Type}
              (population : Population Secret)
              (criterion : Criterion Secret Guess)
              (transcript : Observation Secret Transcript)
              (train : Transcript -> Student)
              (candidates : CandidateClass Student Guess) :
              candidateBestSuccess population criterion (postprocess transcript train) candidates =
              candidateBestSuccess population criterion transcript (liftCandidateClass train candidates) := by
            exact candidateBest_postprocess_eq_lifted population criterion transcript train candidates

          end PACXAI
          EOF

          cat > PACXAI/Leakage/FiniteCapacity.lean <<'EOF'
          import PACXAI.Core

          namespace PACXAI
          namespace Leakage

          def appears {Secret Out : Type} [BEq Out]
              (secrets : Population Secret)
              (obs : Observation Secret Out)
              (y : Out) : Bool :=
            secrets.any (fun s => obs s == y)

          def outputCoverSize {Secret Out : Type} [BEq Out]
              (secrets : Population Secret)
              (obs : Observation Secret Out)
              (outputs : List Out) : Nat :=
            (outputs.filter (appears secrets obs)).length

          def cartesian {A B : Type} : List A -> List B -> List (A × B)
            | [], _ => []
            | a :: as, bs => bs.map (fun b => (a,b)) ++ cartesian as bs

          def pairObs {Secret A B : Type}
              (obsA : Observation Secret A)
              (obsB : Observation Secret B) : Observation Secret (A × B) :=
            fun s => (obsA s, obsB s)

          theorem postprocess_output_pointwise {Secret Raw Out : Type}
              (obs : Observation Secret Raw)
              (f : Raw -> Out)
              (s : Secret) :
              (postprocess obs f) s = f (obs s) := by
            rfl

          theorem pairObs_pointwise {Secret A B : Type}
              (obsA : Observation Secret A)
              (obsB : Observation Secret B)
              (s : Secret) :
              pairObs obsA obsB s = (obsA s, obsB s) := by
            rfl

          end Leakage
          end PACXAI
          EOF

          cat > PACXAI/InfoTheory/FiniteDistribution.lean <<'EOF'
          import PACXAI.Core

          namespace PACXAI
          namespace InfoTheory

          def sumBy {A : Type} (f : A -> Nat) : List A -> Nat
            | [] => 0
            | x :: xs => f x + sumBy f xs

          structure FiniteDist (A : Type) where
            support : List A
            mass : A -> Nat

          def totalMass {A : Type} (p : FiniteDist A) : Nat :=
            sumBy p.mass p.support

          def mapDist {A B : Type} [BEq B]
              (f : A -> B)
              (p : FiniteDist A) : FiniteDist B where
            support := p.support.map f
            mass := fun b => sumBy (fun a => if f a == b then p.mass a else 0) p.support

          abbrev Code (A : Type) := A -> Nat

          def expectedCodeCost {A : Type} (p : FiniteDist A) (code : Code A) : Nat :=
            sumBy (fun a => p.mass a * code a) p.support

          def relativeCodeCost {A : Type} (p : FiniteDist A) (pCode qCode : Code A) : Nat :=
            sumBy (fun a => p.mass a * (qCode a - pCode a)) p.support

          def pullCode {A B : Type} (f : A -> B) (code : Code B) : Code A :=
            fun a => code (f a)

          theorem expectedCodeCost_pullback {A B : Type}
              (p : FiniteDist A)
              (f : A -> B)
              (code : Code B) :
              sumBy (fun a => p.mass a * pullCode f code a) p.support =
              sumBy (fun a => p.mass a * code (f a)) p.support := by
            rfl

          theorem totalMass_unfold {A : Type} (p : FiniteDist A) :
              totalMass p = sumBy p.mass p.support := by
            rfl

          end InfoTheory
          end PACXAI
          EOF

          cat > PACXAI/InfoTheory/DPI.lean <<'EOF'
          import PACXAI.InfoTheory.FiniteDistribution
          import PACXAI.Core

          namespace PACXAI
          namespace InfoTheory

          abbrev DetChannel (A B : Type) := A -> B

          def observedCodeCost {Secret Obs : Type}
              (p : FiniteDist Secret)
              (obs : Observation Secret Obs)
              (code : Code Obs) : Nat :=
            sumBy (fun s => p.mass s * code (obs s)) p.support

          theorem deterministic_dpi_exact {Secret Raw Out : Type}
              (p : FiniteDist Secret)
              (raw : Observation Secret Raw)
              (f : DetChannel Raw Out)
              (outCode : Code Out) :
              observedCodeCost p (postprocess raw f) outCode =
              observedCodeCost p raw (pullCode f outCode) := by
            rfl

          def restrictDist {A : Type}
              (p : FiniteDist A)
              (condition : A -> Bool) : FiniteDist A where
            support := p.support.filter condition
            mass := p.mass

          theorem conditional_deterministic_dpi_exact {Secret Raw Out : Type}
              (p : FiniteDist Secret)
              (condition : Secret -> Bool)
              (raw : Observation Secret Raw)
              (f : DetChannel Raw Out)
              (outCode : Code Out) :
              observedCodeCost (restrictDist p condition) (postprocess raw f) outCode =
              observedCodeCost (restrictDist p condition) raw (pullCode f outCode) := by
            rfl

          def infoGainCost {Secret Obs : Type}
              (p : FiniteDist Secret)
              (obs : Observation Secret Obs)
              (baseline observed : Code Obs) : Nat :=
            sumBy (fun s => p.mass s * (baseline (obs s) - observed (obs s))) p.support

          theorem infoGain_postprocess_exact {Secret Raw Out : Type}
              (p : FiniteDist Secret)
              (raw : Observation Secret Raw)
              (f : DetChannel Raw Out)
              (baseline observed : Code Out) :
              infoGainCost p (postprocess raw f) baseline observed =
              infoGainCost p raw (pullCode f baseline) (pullCode f observed) := by
            rfl

          end InfoTheory
          end PACXAI
          EOF

          cat > PACXAI/InfoTheory/FanoStyle.lean <<'EOF'
          import PACXAI.Core
          import PACXAI.Recovery
          import PACXAI.InfoTheory.FiniteDistribution
          import PACXAI.InfoTheory.DPI

          namespace PACXAI
          namespace InfoTheory

          structure FanoStyleCertificate where
            total : Nat
            successes : Nat
            allowedErrors : Nat
            requiredInformation : Nat
            deriving Repr, BEq

          def FanoStyleCertificate.Valid (c : FanoStyleCertificate) : Prop :=
            c.total <= c.successes + c.allowedErrors

          def fanoStyleFromAttack {Secret Obs Guess : Type}
              (secrets : Population Secret)
              (criterion : Criterion Secret Guess)
              (obs : Observation Secret Obs)
              (attack : CandidateAttack Obs Guess)
              (allowedErrors requiredInformation : Nat) : FanoStyleCertificate :=
            { total := secrets.length,
              successes := observedSuccessCount secrets criterion obs attack,
              allowedErrors := allowedErrors,
              requiredInformation := requiredInformation }

          theorem fanoStyle_student_transcript_success_eq
              {Secret Transcript Student Guess : Type}
              (secrets : Population Secret)
              (criterion : Criterion Secret Guess)
              (transcript : Observation Secret Transcript)
              (train : Transcript -> Student)
              (studentAttack : CandidateAttack Student Guess)
              (allowedErrors requiredInformation : Nat) :
              (fanoStyleFromAttack secrets criterion (postprocess transcript train) studentAttack allowedErrors requiredInformation).successes =
              (fanoStyleFromAttack secrets criterion transcript (liftedAttack train studentAttack) allowedErrors requiredInformation).successes := by
            rfl

          theorem fanoStyle_valid_student_to_transcript
              {Secret Transcript Student Guess : Type}
              (secrets : Population Secret)
              (criterion : Criterion Secret Guess)
              (transcript : Observation Secret Transcript)
              (train : Transcript -> Student)
              (studentAttack : CandidateAttack Student Guess)
              (allowedErrors requiredInformation : Nat)
              (h : (fanoStyleFromAttack secrets criterion (postprocess transcript train) studentAttack allowedErrors requiredInformation).Valid) :
              (fanoStyleFromAttack secrets criterion transcript (liftedAttack train studentAttack) allowedErrors requiredInformation).Valid := by
            exact h

          def violatesInfoBudget (budget : Nat) (cert : FanoStyleCertificate) : Prop :=
            cert.Valid ∧ budget < cert.requiredInformation

          theorem fanoStyle_budget_violation_lifts
              {Secret Transcript Student Guess : Type}
              (secrets : Population Secret)
              (criterion : Criterion Secret Guess)
              (transcript : Observation Secret Transcript)
              (train : Transcript -> Student)
              (studentAttack : CandidateAttack Student Guess)
              (allowedErrors requiredInformation budget : Nat)
              (h : violatesInfoBudget budget (fanoStyleFromAttack secrets criterion (postprocess transcript train) studentAttack allowedErrors requiredInformation)) :
              violatesInfoBudget budget (fanoStyleFromAttack secrets criterion transcript (liftedAttack train studentAttack) allowedErrors requiredInformation) := by
            exact h

          end InfoTheory
          end PACXAI
          EOF

          cat > PACXAI/PAC/MonteCarlo.lean <<'EOF'
          import PACXAI.Core
          import PACXAI.Recovery
          import PACXAI.Conditioning

          namespace PACXAI
          namespace PAC

          structure MonteCarloCertificate where
            samples : Nat
            successes : Nat
            allowedSuccesses : Nat
            confidenceNumerator : Nat
            confidenceDenominator : Nat
            deriving Repr, BEq

          def MonteCarloCertificate.Passes (c : MonteCarloCertificate) : Prop :=
            c.successes <= c.allowedSuccesses

          def monteCarloFromAttack {Secret Obs Guess : Type}
              (samples : Population Secret)
              (criterion : Criterion Secret Guess)
              (obs : Observation Secret Obs)
              (attack : CandidateAttack Obs Guess)
              (allowedSuccesses confidenceNumerator confidenceDenominator : Nat) : MonteCarloCertificate :=
            { samples := samples.length,
              successes := observedSuccessCount samples criterion obs attack,
              allowedSuccesses := allowedSuccesses,
              confidenceNumerator := confidenceNumerator,
              confidenceDenominator := confidenceDenominator }

          theorem monteCarlo_postprocess_success_eq {Secret Raw Out Guess : Type}
              (samples : Population Secret)
              (criterion : Criterion Secret Guess)
              (raw : Observation Secret Raw)
              (f : Raw -> Out)
              (attack : CandidateAttack Out Guess)
              (allowedSuccesses confidenceNumerator confidenceDenominator : Nat) :
              (monteCarloFromAttack samples criterion (postprocess raw f) attack allowedSuccesses confidenceNumerator confidenceDenominator).successes =
              (monteCarloFromAttack samples criterion raw (liftedAttack f attack) allowedSuccesses confidenceNumerator confidenceDenominator).successes := by
            rfl

          theorem monteCarlo_transcript_pass_implies_student_pass {Secret Raw Out Guess : Type}
              (samples : Population Secret)
              (criterion : Criterion Secret Guess)
              (raw : Observation Secret Raw)
              (f : Raw -> Out)
              (attack : CandidateAttack Out Guess)
              (allowedSuccesses confidenceNumerator confidenceDenominator : Nat)
              (h : (monteCarloFromAttack samples criterion raw (liftedAttack f attack) allowedSuccesses confidenceNumerator confidenceDenominator).Passes) :
              (monteCarloFromAttack samples criterion (postprocess raw f) attack allowedSuccesses confidenceNumerator confidenceDenominator).Passes := by
            exact h

          def monteCarloFromCandidateClass {Secret Obs Guess : Type}
              (samples : Population Secret)
              (criterion : Criterion Secret Guess)
              (obs : Observation Secret Obs)
              (candidates : CandidateClass Obs Guess)
              (allowedSuccesses confidenceNumerator confidenceDenominator : Nat) : MonteCarloCertificate :=
            { samples := samples.length,
              successes := candidateBestSuccess samples criterion obs candidates,
              allowedSuccesses := allowedSuccesses,
              confidenceNumerator := confidenceNumerator,
              confidenceDenominator := confidenceDenominator }

          theorem monteCarlo_candidateClass_postprocess_eq {Secret Raw Out Guess : Type}
              (samples : Population Secret)
              (criterion : Criterion Secret Guess)
              (raw : Observation Secret Raw)
              (f : Raw -> Out)
              (candidates : CandidateClass Out Guess)
              (allowedSuccesses confidenceNumerator confidenceDenominator : Nat) :
              monteCarloFromCandidateClass samples criterion (postprocess raw f) candidates allowedSuccesses confidenceNumerator confidenceDenominator =
              monteCarloFromCandidateClass samples criterion raw (liftCandidateClass f candidates) allowedSuccesses confidenceNumerator confidenceDenominator := by
            simp [monteCarloFromCandidateClass, candidateBest_postprocess_eq_lifted]

          end PAC
          end PACXAI
          EOF

