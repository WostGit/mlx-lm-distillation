      - name: Install elan and Lean
        run: |
          set -euxo pipefail
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Install selected Lean toolchain
        run: |
          set -euxo pipefail
          TOOLCHAIN="$(cat lean-toolchain)"

          if elan toolchain list | grep -Fxq "$TOOLCHAIN"; then
            echo "Toolchain already installed: $TOOLCHAIN"
          else
            elan toolchain install "$TOOLCHAIN"
          fi

          elan default "$TOOLCHAIN"
          lean --version | tee lean-version.log
          lake --version | tee lake-version.log

      - name: Show generated project files without git or venv noise
        run: |
          set -euxo pipefail
          find . -maxdepth 5 -type f \
            -not -path './.git/*' \
            -not -path './.venv/*' \
            -not -path './.lake/*' \
            | sort | sed 's#^\./##' | tee project-files.log

      - name: Build Lean project
        run: |
          set -euxo pipefail
          lake build 2>&1 | tee lean-build.log

      - name: Run Lean forbidden-token and axiom audit
        run: |
          set -euxo pipefail
          bash scripts/audit.sh 2>&1 | tee lean-audit.log

      - name: Run proof-matched MLX experiments
        run: |
          set -euxo pipefail
          source .venv/bin/activate
          python experiments/mlx_proof_matched_experiments.py 2>&1 | tee mlx-proof-matched.log

      - name: Validate proof-matched MLX experiment signals
        run: |
          set -euxo pipefail
          source .venv/bin/activate

          python - <<'PY'
          import json
          from pathlib import Path

          summary = json.loads(Path("results/mlx_proof_matched/summary.json").read_text())

          print("================================================================================")
          print("VALIDATING MLX PROOF-MATCHED EXPERIMENT SIGNALS")
          print("================================================================================")
          print(json.dumps(summary, indent=2))

          assert summary["deterministic_student_minus_transcript_simulator_success"] == 0
          assert summary["candidate_best_gap"] == 0
          assert summary["code_cost_gap"] == 0
          assert summary["fano_student_valid"] is True
          assert summary["fano_transcript_valid"] is True
          assert summary["monte_carlo_transcript_pass"] is True
          assert summary["monte_carlo_student_pass"] is True
          assert summary["route_metadata_false_pass_under_transcript_audit"] is True
          assert summary["route_metadata_student_minus_transcript_simulator_success"] > 0

          for group, rec in summary["conditional"].items():
              assert rec["deterministic_gap"] == 0, (group, rec)

          print("Verdict: all MLX proof-matched signals PASS")
          print("================================================================================")
          PY

      - name: Print ultra-verbose publishable Lean + MLX report
        run: |
          set -euxo pipefail
          source .venv/bin/activate
          python experiments/print_publishable_report.py

      - name: Print compact reviewer-facing result table
        run: |
          set -euxo pipefail
          source .venv/bin/activate

          python - <<'PY'
          import json
          from pathlib import Path

          s = json.loads(Path("results/mlx_proof_matched/summary.json").read_text())

          print("")
          print("=" * 100)
          print("PACXAI REVIEWER-FACING RESULT TABLE")
          print("=" * 100)
          print(f"Population size: {s['n']}")
          print(f"Transcript successes: {s['transcript_success']}")
          print(f"Transcript simulator successes: {s['transcript_simulator_success']}")
          print(f"Route-metadata successes: {s['route_metadata_success']}")
          print(f"Subgroup-aux successes: {s['subgroup_aux_success']}")
          print("-" * 100)
          print(f"POST-PROCESSING CHECK: deterministic student gap = {s['deterministic_student_minus_transcript_simulator_success']} (expected 0)")
          print(f"CANDIDATE-BEST CHECK: candidate-best gap = {s['candidate_best_gap']} (expected 0)")
          print(f"FINITE DPI CHECK: code-cost gap = {s['code_cost_gap']} (expected 0)")
          print(f"FANO-STYLE CHECK: student valid = {s['fano_student_valid']}, transcript valid = {s['fano_transcript_valid']}")
          print(f"PAC MONTE CARLO CHECK: transcript pass = {s['monte_carlo_transcript_pass']}, student pass = {s['monte_carlo_student_pass']}")
          print("-" * 100)
          print(f"ASSUMPTION BUG: route metadata false pass = {s['route_metadata_false_pass_under_transcript_audit']}")
          print(f"ROUTE-METADATA LIFT: +{s['route_metadata_student_minus_transcript_simulator_success']} successes over transcript simulator")
          print("=" * 100)
          print("")
          PY

      - name: Prepare committed CI results
        if: always()
        run: |
          set -euxo pipefail

          rm -rf ci-results/latest
          mkdir -p ci-results/latest

          cp lean-version.log ci-results/latest/ 2>/dev/null || true
          cp lake-version.log ci-results/latest/ 2>/dev/null || true
          cp project-files.log ci-results/latest/ 2>/dev/null || true
          cp lean-build.log ci-results/latest/ 2>/dev/null || true
          cp lean-audit.log ci-results/latest/ 2>/dev/null || true
          cp mlx-proof-matched.log ci-results/latest/ 2>/dev/null || true

          if [ -f results/PUBLISHABLE_CONSOLE_REPORT.md ]; then
            cp results/PUBLISHABLE_CONSOLE_REPORT.md ci-results/latest/
          fi

          if [ -d results ]; then
            mkdir -p ci-results/latest/results
            cp -R results/. ci-results/latest/results/
          fi

          cat > ci-results/latest/summary.md <<EOF
          # PACXAI Lean + MLX latest results

          - Workflow: ${GITHUB_WORKFLOW}
          - Run id: ${GITHUB_RUN_ID}
          - Run attempt: ${GITHUB_RUN_ATTEMPT}
          - Commit: ${GITHUB_SHA}
          - Generated at: $(date -u +%Y-%m-%dT%H:%M:%SZ)

          This workflow is self-contained: it generated the Lean project, built it, audited it, ran MLX experiments matched to the Lean theorems, validated the expected signals, and printed a publishable reviewer-facing report.
          EOF

          find ci-results/latest -type f | sort

      - name: Commit generated project and CI results back to repo
        if: always() && github.event_name != 'pull_request'
        run: |
          set -euxo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            lean-toolchain \
            lakefile.lean \
            PACXAI.lean \
            PACXAI \
            scripts \
            experiments \
            results \
            ci-results/latest

          if git diff --cached --quiet; then
            echo "No generated project/result changes to commit."
          else
            git commit -m "ci: generate ultra-verbose Lean+MLX PACXAI artifact [skip ci]"
            git push
          fi

      - name: Upload generated project, logs, reports, and MLX results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pacxai-ultra-verbose-lean-mlx-artifact
          path: |
            lean-toolchain
            lakefile.lean
            PACXAI.lean
            PACXAI/**
            scripts/**
            experiments/**
            lean-version.log
            lake-version.log
            project-files.log
            lean-build.log
            lean-audit.log
            mlx-proof-matched.log
            results/**
            ci-results/latest/**
          if-no-files-found: ignore
          retention-days: 14
